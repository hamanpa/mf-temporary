neuron_simulation:
  execution_mode: run       # run, load
  simulator: pynn.nest           # pynn.nest, zerlaut2018_simulator, divolo2019_simulator
  grid:
    exc_neuron:
      grid_type: adaptive    # linear, adaptive, custom 
      exc_rate_grid: adaptive
      inh_rate_grid: [0, 30, 16]
      out_rate_grid: [0, 30, 16]
    inh_neuron:
      grid_type: adaptive
      exc_rate_grid: adaptive
      inh_rate_grid: [0, 30, 16]
      out_rate_grid: [0, 30, 16]
  simulation_time: 13000.0
  averaging_window: 10000.0
  time_step: 0.1
  seed: 42
  n_runs: 5
  cpus: 16
  init_values: &init_values
    exc_neuron:
      voltage: -65.0
      adaptation: 0.0
    inh_neuron:
      voltage: -65.0
      adaptation: 0.0
snn_simulation:
  network_name: divolo_static
  execution_mode: run  # run, load
  simulator: pynn.nest
  time_step: &time_step 0.1
  seed: 42
  n_runs: 5
  smoothing:
    function: sliding_window
    time_constant: 50
    kwargs: {}
  init_values: *init_values
  recorded_samples:
    exc_neuron: 500
    inh_neuron: 500
mf_models:
  DiVolo2019: &divolo2019
    execution_mode: run  # run, load
    simulator: tvb
    model: divolo2019.second_order
    time_step: *time_step
    resolution_time: 40.0  # T
    seed: 42
    init_values:
      E: [0.0, 0.0]
      I: [0.0, 0.0]
      C_ee: [0.5, 0.5]
      C_ei: [0.5, 0.5]
      C_ii: [0.5, 0.5]
      W_e: [0.05, 0.05]
      W_i: [0.0, 0.0]
      noise: [0.0, 0.0]
      stimulus: [0.0, 0.0]
    transfer_function: &transfer_function
      fit_transfer_function : true
      tf_model: &custom_tf_model
        model_name: neuropsi.custom
        square_terms : true
        log_term : false
        adaptation : true
        static_synapses : true
      expansion_point : &expansion_point
        voltage_mean : -60.0
        voltage_std : 4.0
        voltage_tau : 0.5
      expansion_norm : &expansion_norm
        voltage_mean : 10.0
        voltage_std : 6.0
        voltage_tau : 1.0
      fit_with_w : true
      out_rate_min: 0.0
      out_rate_max: 200.0
      V_eff_fitting:
        method : SLSQP
        options : 
          ftol : 5.0e-9
          disp : false
          maxiter : 10000
      TF_fitting : 
        method : nelder-mead
        options: 
          fatol: 5.0e-9
          disp : false
          maxiter : 10000
  STP_asymptotic: &stp_asymptotic
    execution_mode: run  # run, load
    simulator: tvb
    model: stp_asymptotic.second_order
    time_step: *time_step
    resolution_time: 40.0  # T
    seed: 42
    init_values:
      E: [0.0, 0.0]
      I: [0.0, 0.0]
      C_ee: [0.5, 0.5]
      C_ei: [0.5, 0.5]
      C_ii: [0.5, 0.5]
      W_e: [0.05, 0.05]
      W_i: [0.0, 0.0]
      noise: [0.0, 0.0]
      stimulus: [0.0, 0.0]
    transfer_function:
      <<: *transfer_function
      tf_model:
        model_name: neuropsi.custom
        square_terms : true
        log_term : false
        adaptation : true
        static_synapses : false
  STP_dynamic: &stp_dynamic
    execution_mode: run  # run, load
    simulator: tvb
    model: stp_dynamic.second_order
    time_step: *time_step
    resolution_time: 40.0  # T
    seed: 42
    init_values:
      E: [0.0, 0.0]
      I: [0.0, 0.0]
      C_ee: [0.5, 0.5]
      C_ei: [0.5, 0.5]
      C_ii: [0.5, 0.5]
      W_e: [0.05, 0.05]
      W_i: [0.0, 0.0]
      X_e: [1.0, 1.0]
      Y_e: [0.0, 0.0]
      U_e: [1.0, 1.0]
      X_i: [1.0, 1.0]
      Y_i: [0.0, 0.0]
      U_i: [1.0, 1.0]
      noise: [0.0, 0.0]
      stimulus: [0.0, 0.0]
    transfer_function:
      <<: *transfer_function
      tf_model:
        model_name: neuropsi.custom
        square_terms : true
        log_term : false
        adaptation : true
        static_synapses : false
