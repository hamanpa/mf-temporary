{
    "neuron_simulation" : {  # the same name as module
        "execution_mode" : "run", 
        # "run" - run the simulation and save the results
        # "load" - load the results from the file, and skip the simulation
        # "skip" - skip the simulation and loading (useful when no TF is to be fitted, and we just want to run the network simulations with the fitted TF)
        # TODO: "validate" - run the simulation, load the results from the file, and compares

        "simulator" : "pynn.nest",  # str, name of the simulator to use for neuron simulations

        "grid" : {
            # "grid_type" : "linear",
            # "exc_rate_grid" : [0, 60, 16],
            # "inh_rate_grid" : [0, 60, 16],

            "grid_type" : "adaptive",
            "exc_rate_grid" : "adaptive",
            "inh_rate_grid" : [0, 60, 16],
            "out_rate_grid" : [0, 40, 16],
            "n_coarse_interpolation_points" : 50,  # Optional, if not set, will default to 1.5x the number of points in out_rate_grid
